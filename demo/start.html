<!doctype html>
<html lang="en" class="start-page">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control - Start</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="start-mode">
  <main class="start-stage">
    <section class="start-particle-shell" aria-label="F1 track particle morph">
      <canvas id="trackParticleCanvas" class="start-particle-canvas"></canvas>
      <p class="start-particle-caption">F1 Track Particle Morph</p>
    </section>

    <button
      id="startEntryBtn"
      class="btn btn-enter"
      type="button"
      aria-label="Start race control"
    >
      <span class="start-btn-core">ENTER</span>
    </button>
  </main>

  <script>
    (() => {
      const START_GATE_KEY = "raceControlStarted";
      const AUTO_START_KEY = "raceControlAutoStart";
      const startEntryBtn = document.getElementById("startEntryBtn");
      const particleCanvas = document.getElementById("trackParticleCanvas");

      if (!startEntryBtn) return;

      let navigating = false;
      let particleRafId = null;
      let canvasCtx = null;
      let dpr = 1;
      let particleCloud = [];
      let trackTargets = [];
      let particles = [];

      const TRACK_TEMPLATE_POINTS = [
        [0.10, 0.56], [0.18, 0.45], [0.33, 0.37], [0.50, 0.35], [0.67, 0.42],
        [0.79, 0.55], [0.84, 0.69], [0.76, 0.80], [0.58, 0.84], [0.42, 0.80],
        [0.30, 0.73], [0.23, 0.63], [0.26, 0.56], [0.38, 0.57], [0.48, 0.63],
        [0.62, 0.66], [0.70, 0.61], [0.66, 0.53], [0.53, 0.49], [0.40, 0.48],
        [0.27, 0.50], [0.16, 0.59],
      ];

      const createCircleCloud = (count, width, height) => {
        const cx = width * 0.5;
        const cy = height * 0.58;
        const radius = Math.min(width, height) * 0.22;
        const points = [];
        for (let i = 0; i < count; i += 1) {
          const angle = (i / count) * Math.PI * 2;
          const wobble = 0.72 + (Math.sin(i * 0.91) * 0.08);
          points.push({
            x: cx + Math.cos(angle) * radius * wobble,
            y: cy + Math.sin(angle) * radius * wobble,
          });
        }
        return points;
      };

      const sampleClosedPath = (path, count, width, height) => {
        const scaled = path.map(([x, y]) => ({ x: x * width, y: y * height }));
        const segmentLengths = [];
        let totalLength = 0;

        for (let i = 0; i < scaled.length; i += 1) {
          const a = scaled[i];
          const b = scaled[(i + 1) % scaled.length];
          const len = Math.hypot(b.x - a.x, b.y - a.y);
          segmentLengths.push(len);
          totalLength += len;
        }

        const points = [];
        for (let i = 0; i < count; i += 1) {
          const distance = (i / count) * totalLength;
          let running = 0;
          let segmentIndex = 0;

          for (; segmentIndex < segmentLengths.length; segmentIndex += 1) {
            if (running + segmentLengths[segmentIndex] >= distance) break;
            running += segmentLengths[segmentIndex];
          }

          const segStart = scaled[segmentIndex % scaled.length];
          const segEnd = scaled[(segmentIndex + 1) % scaled.length];
          const segLen = segmentLengths[segmentIndex] || 1;
          const t = (distance - running) / segLen;

          points.push({
            x: segStart.x + ((segEnd.x - segStart.x) * t),
            y: segStart.y + ((segEnd.y - segStart.y) * t),
          });
        }

        return points;
      };

      const initParticles = () => {
        if (!particleCanvas) return;
        canvasCtx = particleCanvas.getContext("2d");
        if (!canvasCtx) return;

        const rect = particleCanvas.getBoundingClientRect();
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        particleCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
        particleCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const width = rect.width;
        const height = rect.height;
        const count = width < 700 ? 500 : 860;

        particleCloud = createCircleCloud(count, width, height);
        trackTargets = sampleClosedPath(TRACK_TEMPLATE_POINTS, count, width, height);
        particles = trackTargets.map((target, i) => ({
          x: particleCloud[i].x,
          y: particleCloud[i].y,
          vx: 0,
          vy: 0,
          phase: (i / count) * Math.PI * 2,
        }));
      };

      const animateParticles = (timeMs) => {
        if (!canvasCtx || !particleCanvas) return;
        const width = particleCanvas.width / dpr;
        const height = particleCanvas.height / dpr;

        const morph = 0.5 + (0.5 * Math.sin(timeMs * 0.00065));

        canvasCtx.clearRect(0, 0, width, height);
        canvasCtx.fillStyle = "rgba(22, 22, 22, 0.88)";
        canvasCtx.shadowColor = "rgba(255, 255, 255, 0.4)";
        canvasCtx.shadowBlur = 4;
        for (let i = 0; i < particles.length; i += 1) {
          const from = particleCloud[i];
          const to = trackTargets[i];
          const p = particles[i];

          const tx = from.x + ((to.x - from.x) * morph);
          const ty = from.y + ((to.y - from.y) * morph);

          p.vx += (tx - p.x) * 0.04;
          p.vy += (ty - p.y) * 0.04;
          p.vx *= 0.86;
          p.vy *= 0.86;
          p.x += p.vx + Math.sin((timeMs * 0.0012) + p.phase) * 0.08;
          p.y += p.vy + Math.cos((timeMs * 0.0011) + p.phase) * 0.08;

          canvasCtx.beginPath();
          canvasCtx.arc(p.x, p.y, 1.15, 0, Math.PI * 2);
          canvasCtx.fill();
        }
        canvasCtx.shadowBlur = 0;

        particleRafId = requestAnimationFrame(animateParticles);
      };

      if (particleCanvas) {
        const setupAndAnimate = () => {
          initParticles();
          if (particleRafId !== null) cancelAnimationFrame(particleRafId);
          particleRafId = requestAnimationFrame(animateParticles);
        };

        setupAndAnimate();
        window.addEventListener("resize", setupAndAnimate);

        document.addEventListener("visibilitychange", () => {
          if (document.hidden && particleRafId !== null) {
            cancelAnimationFrame(particleRafId);
            particleRafId = null;
          } else if (!document.hidden && particleRafId === null) {
            particleRafId = requestAnimationFrame(animateParticles);
          }
        });
      }

      const goToDashboard = () => {
        if (navigating) return;
        navigating = true;

        startEntryBtn.disabled = true;
        startEntryBtn.setAttribute("aria-busy", "true");

        try {
          sessionStorage.setItem(START_GATE_KEY, "true");
          sessionStorage.setItem(AUTO_START_KEY, "true");
        } catch (error) {
          console.warn("sessionStorage unavailable:", error);
        }

        window.location.assign("index.html");
      };

      startEntryBtn.addEventListener("click", goToDashboard);

      startEntryBtn.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goToDashboard();
        }
      });
    })();
  </script>
</body>
</html>
