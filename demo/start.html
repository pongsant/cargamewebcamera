<!doctype html>
<html lang="en" class="start-page">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control - Start</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="start-mode">
  <main class="start-stage">
    <section class="start-particle-shell" aria-label="Race track intro video">
      <video
        id="startIntroVideo"
        class="start-intro-video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      >
        <source src="Race_Track_done.MP4" type="video/mp4" />
      </video>
    </section>

    <button
      id="startEntryBtn"
      class="btn btn-enter"
      type="button"
      aria-label="Start race control"
    >
      <span class="start-btn-core">ENTER</span>
    </button>
  </main>

  <script>
    (() => {
      const START_GATE_KEY = "raceControlStarted";
      const AUTO_START_KEY = "raceControlAutoStart";

      const startEntryBtn = document.getElementById("startEntryBtn");
      const startIntroVideo = document.getElementById("startIntroVideo");

      if (!startEntryBtn) return;

      let navigating = false;

      const ensureVideoPlayback = () => {
        if (!startIntroVideo) return;
        startIntroVideo.muted = true;
        const playPromise = startIntroVideo.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {
            // Ignore autoplay rejection; user can still continue with ENTER.
          });
        }
      };

      const syncVideoFitMode = () => {
        if (!startIntroVideo) return;

        const videoWidth = startIntroVideo.videoWidth || 16;
        const videoHeight = startIntroVideo.videoHeight || 9;
        const videoRatio = videoWidth / videoHeight;
        const viewportRatio = window.innerWidth / Math.max(window.innerHeight, 1);

        const ratioDiff = Math.abs(viewportRatio - videoRatio);
        const shouldContain = ratioDiff > 0.36;

        startIntroVideo.classList.toggle("fit-contain", shouldContain);
      };

      ensureVideoPlayback();
      syncVideoFitMode();
      window.addEventListener("load", ensureVideoPlayback, { once: true });
      startIntroVideo?.addEventListener("loadedmetadata", syncVideoFitMode);
      window.addEventListener("resize", syncVideoFitMode, { passive: true });
      document.addEventListener("visibilitychange", () => {
        if (!startIntroVideo) return;
        if (document.hidden) {
          startIntroVideo.pause();
        } else {
          ensureVideoPlayback();
          syncVideoFitMode();
        }
      });

      const goToDashboard = () => {
        if (navigating) return;
        navigating = true;

        startEntryBtn.disabled = true;
        startEntryBtn.setAttribute("aria-busy", "true");

        try {
          sessionStorage.setItem(START_GATE_KEY, "true");
          sessionStorage.setItem(AUTO_START_KEY, "true");
        } catch (error) {
          console.warn("sessionStorage unavailable:", error);
        }

        window.location.assign("index.html");
      };

      startEntryBtn.addEventListener("click", goToDashboard);
      startEntryBtn.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          goToDashboard();
        }
      });
    })();
  </script>
</body>
</html>
