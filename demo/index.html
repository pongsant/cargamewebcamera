<!doctype html>
<html lang="en" class="dashboard-page">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control - Live Dashboard</title>
  <script>
    (() => {
      const START_GATE_KEY = "raceControlStarted";
      let canEnterDashboard = false;

      try {
        canEnterDashboard = sessionStorage.getItem(START_GATE_KEY) === "true";
      } catch (error) {
        canEnterDashboard = false;
      }

      if (!canEnterDashboard) {
        window.location.replace("start.html");
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    .camera-two-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(240px, 1fr);
      gap: var(--space-1);
      align-items: start;
    }

    .camera-card--main video {
      aspect-ratio: 16 / 9;
    }

    .camera-card--phone video {
      aspect-ratio: 9 / 16;
      max-height: clamp(260px, 52vw, 560px);
    }

    .camera-hidden-controls {
      display: none !important;
    }

    .camera-status-row {
      margin-top: var(--space-1);
    }

    .ops-bottom-stack {
      display: grid;
      gap: var(--space-1);
    }

    .timer-bottom-panel {
      padding: var(--space-1);
    }

    .timer-control-top {
      margin-bottom: var(--space-2);
    }

    .camera-setup-bottom {
      margin-top: var(--space-2);
      margin-bottom: 0;
      justify-content: center;
      gap: var(--space-1);
    }

    .camera-setup-bottom #cameraStatus {
      width: 100%;
      margin: 0;
      text-align: center;
    }

    .camera-setup-bottom #cameraStatus:empty {
      display: none;
    }

    .camera-setup-bottom .setup-actions {
      width: 100%;
      justify-content: center;
    }

    @media (max-width: 980px) {
      .camera-two-grid {
        grid-template-columns: 1fr;
      }

      .camera-card--phone video {
        aspect-ratio: 16 / 9;
        max-height: none;
      }
    }
  </style>
</head>
<body class="dashboard-mode">
  <header class="top-bar">
    <div class="top-title-wrap">
      <model-viewer
        class="top-logo-viewer"
        src="../model/F9G_logo_racing_3d.glb"
        alt="F9G Racing logo"
        disable-pan
        interaction-prompt="none"
        style="--poster-color: transparent;"
      ></model-viewer>
    </div>
    <div class="top-status-wrap">
      <p class="live-state">Live Session</p>
      <a id="exitBtn" class="btn btn-ghost" href="start.html">Exit</a>
    </div>
  </header>

  <main class="dashboard-layout">
    <section class="camera-module panel-shell">
      <div class="module-head">
        <h2>Camera View</h2>
      </div>

      <section class="panel-lite compact-panel timer-bottom-panel timer-control-top">
        <div class="module-head">
          <h2>Timer Control</h2>
        </div>
        <div id="timerDisplayFrame" class="timer-display-rect is-paused is-idle" aria-live="polite">
          <canvas id="timerFxCanvas" class="timer-fx-canvas" aria-hidden="true"></canvas>
          <p id="timer" class="timer"></p>
        </div>
        <div class="timer-actions">
          <button id="startBtn" class="btn btn-accent" type="button">Start</button>
          <button id="stopBtn" class="btn" type="button">Stop</button>
          <button id="resetBtn" class="btn" type="button">Reset</button>
        </div>
      </section>

      <div class="camera-two-grid">
        <article class="camera-card panel-lite camera-card--main">
          <div class="camera-head">
            <h3>Main Camera</h3>
            <span class="live-pill">Live</span>
          </div>
          <video id="mainVideo" autoplay playsinline muted></video>
        </article>

        <article class="camera-card panel-lite camera-card--phone">
          <div class="camera-head">
            <h3>Prum iPhone 17 Pro</h3>
            <select id="frontSelect" class="control-input"></select>
          </div>
          <video id="frontVideo" autoplay playsinline muted></video>
        </article>

        <div class="camera-hidden-controls" aria-hidden="true">
          <select id="programSelect" class="control-input">
            <option value="front">Prum iPhone 17 Pro</option>
          </select>
        </div>
      </div>

      <div class="camera-setup camera-setup-bottom panel-lite">
        <p id="cameraStatus" class="setup-note"></p>
        <div class="setup-actions">
          <button id="enableCamsBtn" class="btn btn-accent" type="button">Start</button>
          <button id="stopCamsBtn" class="btn" type="button">Stop</button>
        </div>
      </div>

      <p id="frameStreamStatus" class="setup-note camera-status-row">Waiting…</p>
    </section>
  </main>

  <section class="scoreboard-bottom panel-shell race-results-shell">
    <aside class="results-side-rail" aria-hidden="true">
      <span class="results-side-main">RESULT</span>
      <span class="results-side-sub">RACE</span>
    </aside>

    <div class="results-main">
      <header class="results-topline">
        <div class="results-event">
          <p class="results-season">2026 Live Session</p>
          <h2>Race Ranking</h2>
        </div>
        <p class="results-brand">F9G Race Control</p>
      </header>

      <div class="results-podium" aria-live="polite">
        <article class="podium-card podium-card--p2">
          <span class="podium-rank">P2</span>
          <p id="podiumP2Name" class="podium-name">No Driver</p>
        </article>
        <article class="podium-card podium-card--p1">
          <span class="podium-rank">P1</span>
          <p id="podiumP1Name" class="podium-name">No Driver</p>
        </article>
        <article class="podium-card podium-card--p3">
          <span class="podium-rank">P3</span>
          <p id="podiumP3Name" class="podium-name">No Driver</p>
        </article>
      </div>

      <div class="results-grid">
        <div class="score-controls panel-lite results-controls">
          <label for="playerNameInput">Add Player</label>
          <div class="score-row">
            <input id="playerNameInput" class="control-input" type="text" placeholder="Player name" />
            <button id="addPlayerBtn" class="btn" type="button">Add</button>
          </div>
          <label for="playerSelect">Save Time To</label>
          <div class="score-row">
            <select id="playerSelect" class="control-input"></select>
            <button id="saveTimeBtn" class="btn btn-accent" type="button">Save Time</button>
          </div>
          <p id="scoreStatus" class="setup-note">Add a player to start recording scores.</p>
        </div>

        <div class="table-panel panel-lite results-table-panel">
          <table class="results-table">
            <thead>
              <tr>
                <th>Rank</th>
                <th>Driver</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="scoreboardBody"></tbody>
          </table>
          <div class="results-more-row">
            <button id="moreResultsBtn" class="btn results-more-btn" type="button">More</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="moreResultsModal" class="results-modal is-hidden" aria-hidden="true">
    <button class="results-modal-backdrop" type="button" data-close-modal="true" aria-label="Close full ranking"></button>
    <div class="results-modal-card panel-shell" role="dialog" aria-modal="true" aria-labelledby="moreResultsTitle">
      <div class="results-modal-head">
        <h3 id="moreResultsTitle">Full Ranking</h3>
        <button id="closeMoreResultsBtn" class="btn btn-accent" type="button">Close</button>
      </div>
      <div class="results-modal-body">
        <table class="results-table results-table--modal">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Driver</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="scoreboardModalBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
