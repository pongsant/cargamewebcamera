<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Control - Start</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <div id="bg-canvas" aria-hidden="true"></div>

  <main class="start-page">
    <section class="start-showcase">
      <model-viewer
        class="start-logo-viewer"
        src="model/F9G_logo_racing_3d.glb"
        alt="F9G Racing logo"
        auto-rotate
        auto-rotate-delay="0"
        rotation-per-second="24deg"
        camera-controls
        disable-pan
        interaction-prompt="none"
        exposure="0.82"
        shadow-intensity="1"
        shadow-softness="0.9"
      ></model-viewer>
      <a class="btn primary start-action" href="index.html">Start</a>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
